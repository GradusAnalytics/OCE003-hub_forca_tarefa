name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch atual
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identificar branch
        id: vars
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Checkout gh-pages (ou cria se não existir)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo "GitHub Pages - Hub PMI OceanPact x CBO" > README.md
            git add README.md
            git commit -m "chore: inicializa branch gh-pages"
          fi

      - name: Copiar HTML da branch para pasta correspondente
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"
          mkdir -p "$BRANCH"
          # Copia todos os HTMLs da branch de origem
          git show origin/$BRANCH -- $(git ls-tree --name-only origin/$BRANCH | grep '\.html$') | \
            xargs -I{} git show origin/$BRANCH:{} > /dev/null 2>&1 || true
          for file in $(git ls-tree --name-only origin/$BRANCH | grep '\.html$'); do
            git show origin/$BRANCH:$file > "$BRANCH/$file"
            echo "Copiado: $file → $BRANCH/$file"
          done

      - name: Gerar index.html raiz com links para cada ambiente
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Hub PMI OceanPact × CBO</title>
            <style>
              body{font-family:sans-serif;padding:40px;background:#F4F6FA;color:#002060}
              h1{font-size:20px;margin-bottom:24px}
              a{display:block;margin:8px 0;font-size:15px;color:#306F9F}
            </style>
          </head>
          <body>
            <h1>Hub PMI OceanPact × CBO — Ambientes</h1>
            <a href="main/">🟢 Produção (main)</a>
            <a href="dev/">🔵 Desenvolvimento (dev)</a>
          </body>
          </html>
          EOF

      - name: Commit e push para gh-pages
        run: |
          git add .
          git diff --staged --quiet || git commit -m "deploy: atualiza ${{ steps.vars.outputs.branch }} → gh-pages"
          git push origin gh-pages